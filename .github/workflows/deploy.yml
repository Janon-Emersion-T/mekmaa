name: Deploy Mekmaa

on:
  push:
    branches:
      - main

  workflow_dispatch:

concurrency:
  group: mekmaa-production
  cancel-in-progress: false

permissions:
  contents: read

env:
  GO_VERSION: "1.26.5"

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Verify dependencies
        run: go mod verify

      - name: Run Go vet
        run: go vet ./...

      - name: Run tests
        run: go test ./...

      - name: Build production binary
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: amd64
        run: |
          go build \
            -trimpath \
            -ldflags="-s -w" \
            -o mekmaa \
            .

          test -s mekmaa
          chmod 750 mekmaa
          sha256sum mekmaa

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          ssh-keyscan -p "$VPS_PORT" -H "$VPS_HOST" \
            >> ~/.ssh/known_hosts

          chmod 600 ~/.ssh/known_hosts

      - name: Upload new binary
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          scp \
            -P "$VPS_PORT" \
            -i ~/.ssh/id_ed25519 \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            mekmaa \
            "${VPS_USER}@${VPS_HOST}:/tmp/mekmaa.new"

      - name: Deploy application
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          ssh \
            -p "$VPS_PORT" \
            -i ~/.ssh/id_ed25519 \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            "${VPS_USER}@${VPS_HOST}" \
            "sudo /usr/local/sbin/deploy-mekmaa"

      - name: Verify website
        run: |
          for attempt in {1..10}; do
            STATUS="$(
              curl \
                --silent \
                --output /dev/null \
                --write-out '%{http_code}' \
                --max-time 10 \
                https://mekmaa.com/about \
              || true
            )"

            if [ "$STATUS" = "200" ]; then
              echo "Mekmaa is online."
              exit 0
            fi

            echo "Health check attempt $attempt returned $STATUS"
            sleep 5
          done

          echo "Public health check failed."
          exit 1