name: Deploy Mekmaa

on:
  push:
    branches:
      - main

  workflow_dispatch:

concurrency:
  group: mekmaa-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          ssh-keyscan -p "$VPS_PORT" -H "$VPS_HOST" \
            >> ~/.ssh/known_hosts

          chmod 600 ~/.ssh/known_hosts

      - name: Deploy Mekmaa
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          ssh \
            -p "$VPS_PORT" \
            -i ~/.ssh/id_ed25519 \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            "${VPS_USER}@${VPS_HOST}" \
            "sudo /usr/local/sbin/deploy-mekmaa"

      - name: Verify website
        run: |
          STATUS="$(
            curl \
              --silent \
              --output /dev/null \
              --write-out '%{http_code}' \
              --max-time 15 \
              https://mekmaa.com/about
          )"

          if [ "$STATUS" != "200" ]; then
            echo "Website returned HTTP $STATUS"
            exit 1
          fi

          echo "Mekmaa is online."