{{define "home-cta-band"}}
<section class="border-t border-slate/10 pb-0 pt-14 sm:pt-16">
  <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
    <div class="overflow-hidden rounded-[2rem] border border-white/10 bg-[linear-gradient(135deg,rgba(15,138,95,.92),rgba(7,20,38,.94))] p-6 shadow-[0_24px_70px_rgba(0,0,0,0.28)] sm:p-8 lg:p-10">
      <div class="flex flex-col gap-8 lg:flex-row lg:items-center lg:justify-between">
        <div class="max-w-2xl">
          <p class="text-xs font-bold uppercase tracking-[0.24em] text-[#fde68a]">Ready to book?</p>
          <h2 class="mt-4 text-3xl font-black uppercase tracking-[-0.04em] text-white sm:text-4xl">
            Build your week around better indoor play.
          </h2>
          <p class="mt-4 text-base leading-8 text-white/78">
            Whether you want to reserve a court, ask about coaching or plan regular sessions, Mekmaa gives Jaffna one premium indoor destination for sport.
          </p>
        </div>

        <div class="flex flex-col gap-3 sm:flex-row sm:flex-wrap">
          <a
            href="/book"
            class="inline-flex min-h-12 items-center justify-center rounded-full bg-white px-6 py-3 text-sm font-bold text-[var(--hero-navy)] transition hover:-translate-y-0.5 hover:bg-[#fde68a] focus:outline-none focus-visible:ring-2 focus-visible:ring-white focus-visible:ring-offset-2 focus-visible:ring-offset-[var(--hero-deep-green)]"
          >
            Book Your Slot
          </a>
          <a
            href="/contact"
            class="inline-flex min-h-12 items-center justify-center rounded-full border border-white/16 bg-white/10 px-6 py-3 text-sm font-semibold text-white backdrop-blur-xl transition hover:bg-white/16 focus:outline-none focus-visible:ring-2 focus-visible:ring-white focus-visible:ring-offset-2 focus-visible:ring-offset-[var(--hero-deep-green)]"
          >
            Contact the team
          </a>
        </div>
      </div>
    </div>
  </div>
</section>
{{end}}
