{{define "faq"}}{{template "base" .}}{{end}}

{{define "content"}}
<section class="bg-cloud">
  <div class="mx-auto max-w-5xl px-5 py-14 sm:px-8 lg:py-20">
    <div class="max-w-3xl">
      <p class="inline-flex rounded-full border border-obsidian/10 bg-white/80 px-4 py-2 text-xs font-semibold uppercase tracking-[0.28em] text-slate">
        FAQ
      </p>
      <h1 class="mt-6 text-4xl font-semibold leading-tight text-obsidian sm:text-5xl">
        Questions people ask
        <span class="text-slate/60">before they book.</span>
      </h1>
      <p class="mt-6 text-base leading-8 text-slate/75 sm:text-lg">
        Common answers about bookings, sports availability, coaching and how to contact the Mekmaa team.
      </p>
    </div>

    <div class="mt-12 space-y-4">
      {{range .FAQItems}}
      <article class="rounded-[1.75rem] border border-obsidian/8 bg-white p-6 shadow-sm">
        <h2 class="text-xl font-semibold text-obsidian">{{.Question}}</h2>
        <p class="mt-3 text-sm leading-7 text-slate/70">{{.Answer}}</p>
      </article>
      {{end}}
    </div>
  </div>
</section>
{{end}}
