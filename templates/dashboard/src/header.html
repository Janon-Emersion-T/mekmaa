{{define "dashboard-header"}}
<header class="sticky top-0 z-20 border-b border-white/60 bg-white/75 backdrop-blur-xl">
  <div class="flex flex-col gap-3 px-4 py-4 sm:px-6 lg:flex-row lg:items-center lg:justify-between lg:px-8">
    <div class="flex min-w-0 items-center gap-3">
      <button type="button" data-sidebar-open class="rounded-2xl border border-slate/10 bg-white p-3 text-slate/75 transition hover:bg-cloud lg:hidden">
        <svg class="h-5 w-5" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M3 5h14M3 10h14M3 15h14" stroke-linecap="round"/>
        </svg>
      </button>
      <div>
        <p class="text-xs font-semibold uppercase tracking-[0.25em] text-slate/50">Authenticated area</p>
        <h1 class="truncate text-lg font-semibold sm:text-2xl">{{.Title}}</h1>
      </div>
    </div>

    <div class="flex items-center justify-between gap-3 sm:justify-end">
      <div class="hidden rounded-2xl border border-slate/10 bg-white px-4 py-3 text-right sm:block">
        <p class="text-xs uppercase tracking-[0.2em] text-slate/50">Status</p>
        <p class="mt-1 text-sm font-medium text-emerald-700">Verified session</p>
      </div>
      <form action="/logout" method="post" class="inline">
        <input type="hidden" name="csrf_token" value="{{.CSRFToken}}" />
        <button type="submit" class="rounded-2xl bg-obsidian px-4 py-3 text-sm font-medium text-cloud transition hover:bg-slate">Sign out</button>
      </form>
    </div>
  </div>
</header>
{{end}}
